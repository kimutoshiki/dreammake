# しらべてつくろう!AIラボ
# 教室の PC や ノート で `docker compose up` するだけで ポート 3000 で 起動。
# 児童の iPad は PC の IP:3000 に 接続する(Wi-Fi ルーター 1 つで 完結)。
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # 動かすのに 必要最小限。API キーは .env.local から 取得(compose の env_file で)
      DATABASE_URL: "file:/app/prisma/dev.db"
      NODE_ENV: "production"
      NEXTAUTH_URL: "http://localhost:3000"
    env_file:
      - .env.local
    volumes:
      # SQLite と 児童が 作った 画像・音声・動画を ホスト側に 永続化
      - ./_data/db:/app/prisma
      - ./_data/uploads:/app/public/uploads
    restart: unless-stopped
