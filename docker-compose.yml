# しらべてつくろう!AIラボ
# 教室の PC や ノート で `docker compose up` するだけで ポート 3000 で 起動。
# 児童の iPad は PC の IP:3000 に 接続する(Wi-Fi ルーター 1 つで 完結)。
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # /data 配下に DB と アップロード作品が まとめて 入る(Dockerfile と 一致)
      DATABASE_URL: "file:/data/dev.db"
      NODE_ENV: "production"
    env_file:
      - .env.local
    volumes:
      # SQLite と 児童が 作った 画像・音声・動画を ホスト側に 永続化
      - ./_data:/data
    restart: unless-stopped
